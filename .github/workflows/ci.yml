name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token. Jobs that need more elevate explicitly.
permissions:
  contents: read

# A newer push to the same ref cancels the in-progress run — saves runner
# minutes and gives faster feedback on the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Gate principale : lint + type-check + tests (coverage) + build, plus
  # deux gardes statiques peu coûteuses (audit prod deps, validation des
  # migrations SQL). Bloquant : tout rouge casse la PR.
  #
  # ⚠️ `npm run build` (Vite/esbuild) NE type-check PAS. Sans `tsc -b`
  # ci-dessous, des erreurs de type partent en prod. Ne pas retirer.
  # ──────────────────────────────────────────────────────────────────
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check (tsc -b)
        run: npx tsc -b

      - name: Validate SQL migrations
        run: npm run validate:migrations

      - name: Unit tests + coverage (enforced thresholds)
        run: npm run test:coverage

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ──────────────────────────────────────────────────────────────────
  # Garde sécurité dépendances : échoue si une vulnérabilité high/critical
  # touche une dépendance de PRODUCTION (ce qui est livré au navigateur).
  # Les advisories dev-only (vite/vitest/jsdom) ne bloquent pas — leur fix
  # demande des majeures cassantes et elles ne sont pas expédiées.
  # ──────────────────────────────────────────────────────────────────
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit (prod deps, high+)
        run: npm audit --omit=dev --audit-level=high

  # ──────────────────────────────────────────────────────────────────
  # Tests E2E Playwright (3 parcours démo + scan a11y axe-core, bloquant
  # sur impact=critical). Job séparé : Chromium ~150 MB, plus lent.
  # ──────────────────────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E (Chromium)
        run: npx playwright test --project=chromium
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Tests RLS d'intégration : démarre une stack Supabase locale (GoTrue +
  # PostgREST + Postgres), rejoue TOUTES les migrations sur base vierge via
  # scripts/apply-migrations.mjs, puis vérifie que la RLS isole bien les
  # données entre utilisateurs (e2e/rls/). Filet de sécurité du modèle
  # d'accès (cf. récursion 42P17, mig. 045). Job séparé : Docker + images.
  # ──────────────────────────────────────────────────────────────────
  rls-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: npm ci
      - name: Start Supabase stack (local)
        run: supabase start
      - name: Export Supabase env
        run: |
          supabase status -o env > supabase.env
          # `supabase status -o env` émet API_URL/ANON_KEY/SERVICE_ROLE_KEY/DB_URL.
          # On les remappe vers les noms attendus par le loader et le harnais.
          set -a; . ./supabase.env; set +a
          {
            echo "DATABASE_URL=$DB_URL"
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"
      - name: Apply migrations on fresh DB
        run: node scripts/apply-migrations.mjs
      - name: Run RLS integration tests
        run: npm run test:rls
      - name: Stop Supabase stack
        if: ${{ always() }}
        run: supabase stop
