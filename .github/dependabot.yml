version: 2
updates:
  # ── npm dependencies ────────────────────────────────────────────────
  # Weekly security + version updates. Prod deps surface individually so a
  # CVE bump (react-router, ws, …) is easy to review; dev/test deps are
  # grouped to cut PR noise.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels:
      - dependencies
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # ── GitHub Actions ──────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
